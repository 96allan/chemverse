<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChemVerse Micro-Frontend</title>
  <style>
    body { background: #090d14; color: #e8edf5; font-family: sans-serif; margin: 0; padding: 20px; text-align: center;}
    .app-shell { display: grid; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1000px; margin: 0 auto; text-align: left; }
    .panel { background: #111827; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; }
    canvas { background: #070a12; width: 100%; height: 220px; border-radius: 8px; display: block; }
    input[type=range] { accent-color: #7c6ff7; }
  </style>
</head>
<body>

  <header style="margin-bottom: 30px; padding-bottom: 10px; border-bottom: 1px solid #1f2937;">
    <h2>ChemVerse Distributed UI Engine</h2>
  </header>

  <div class="app-shell">
    <div id="periodic-table-slot" class="panel"></div>
    <div id="inspector-slot" class="panel">
      <h3 id="inspector-title" style="margin-top:0; color:#7c6ff7;">Loading Element...</h3>
      <canvas id="quantumCanvas" width="280" height="220"></canvas>
      <div style="display:flex; justify-content: space-between; margin-top: 12px; align-items:center;">
        <input type="range" id="zoomSlider" min="1" max="25" step="0.2" value="1" style="width:65%;">
        <button id="coreZoomBtn" style="padding:6px 10px; background:#7c6ff7; border:none; color:#fff; border-radius:4px; cursor:pointer; font-size:11px;">Zoom Core</button>
      </div>
    </div>
  </div>

  <script type="module">
    import EventBus from './eventBus.js';
    import { PeriodicTableMFE } from './periodicTableMFE.js';
    import { QuantumEngineMFE } from './quantumEngineMFE.js';

    const table = new PeriodicTableMFE('periodic-table-slot');
    const engine = new QuantumEngineMFE('quantumCanvas', 'zoomSlider', 'coreZoomBtn');

    table.init();
    engine.init();

    EventBus.on('ELEMENT_SELECTED', (el) => {
      document.getElementById('inspector-title').textContent = `${el.name} (${el.s})`;
    });
  </script>
</body>
</html>
